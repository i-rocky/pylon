name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-22.04
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # Clustering/Redis-backed integration tests point at the service container.
      # Tests isolate themselves with random key prefixes.
      PYLON_TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v6

      # Toolchain + rustfmt/clippy are pinned by rust-toolchain.toml; rustup
      # auto-installs it so CI matches local builds exactly.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # Unit tests + non-cluster integration tests — the reliable gate. Serial
      # (`--test-threads=1`) for deterministic, resource-isolated runs.
      - name: Test (unit + integration)
        run: |
          cargo test --locked --lib \
            --test health --test integration --test metrics \
            --test percore --test percore_drain --test percore_liveness \
            --test percore_multiworker --test percore_overload \
            --test percore_selective_drain \
            --test rest --test signin --test tls --test watchlist --test webhooks \
            -- --test-threads=1

      # Cross-node cluster / Redis tests: validated locally, but they assert on
      # short Redis round-trip timing windows that race on the shared CI Redis
      # service. Run them for visibility, but don't block the build on a flake.
      - name: Test (cluster / Redis — non-blocking)
        continue-on-error: true
        run: |
          cargo test --locked \
            --test cluster_bridge --test cluster_subscribe \
            --test percore_cluster --test percore_cluster_cache \
            --test percore_cluster_presence --test percore_cluster_user \
            --test redis_cluster \
            -- --test-threads=1
